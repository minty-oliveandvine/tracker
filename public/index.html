<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>Client Tracker</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #171717;
    --fg-muted: #666666;
    --fg-subtle: #8f8f8f;
    --border: #ebebeb;
    --border-strong: #e0e0e0;
    --surface: #fafafa;
    --surface-hover: #f5f5f5;
    --accent: #171717;
    --accent-fg: #ffffff;
    --green: #0070f3;
    --green-bg: #e8f0fe;
    --success: #0f7b2e;
    --success-bg: #e6f4ea;
    --danger: #c11574;
    --danger-fg: #b91c1c;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 1px 3px rgba(0,0,0,.04);
    --radius: 10px;
    --font: "Geist", ui-sans-serif, system-ui, -apple-system, "Segoe UI",
            Roboto, Helvetica, Arial, sans-serif;
    --mono: "Geist Mono", ui-monospace, SFMono-Regular, "SF Mono", Menlo,
            Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0a0a0a;
      --fg: #ededed;
      --fg-muted: #a1a1a1;
      --fg-subtle: #7d7d7d;
      --border: #1f1f1f;
      --border-strong: #2e2e2e;
      --surface: #141414;
      --surface-hover: #1a1a1a;
      --accent: #ededed;
      --accent-fg: #0a0a0a;
      --green: #3291ff;
      --green-bg: #10233f;
      --success: #5ad07f;
      --success-bg: #10251a;
      --danger: #ff6ab8;
      --danger-fg: #f87171;
      --shadow: 0 1px 2px rgba(0,0,0,.4);
    }
  }

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    padding: 40px 24px 80px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 920px; margin: 0 auto; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 6px;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin: 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo {
    width: 26px; height: 26px;
    border-radius: 7px;
    background: var(--accent);
    color: var(--accent-fg);
    display: grid; place-items: center;
    font-size: 13px; font-weight: 700;
    letter-spacing: -0.03em;
  }

  #status {
    color: var(--fg-muted);
    font-size: 13px;
    margin: 0 0 20px;
    min-height: 18px;
  }

  .toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 16px;
  }
  .search {
    position: relative;
    flex: 1;
    max-width: 320px;
  }
  .search svg {
    position: absolute;
    left: 11px; top: 50%;
    transform: translateY(-50%);
    color: var(--fg-subtle);
    pointer-events: none;
  }
  input[type=search] {
    width: 100%;
    font: inherit;
    font-size: 14px;
    color: var(--fg);
    background: var(--bg);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 8px 12px 8px 34px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  input[type=search]:focus {
    border-color: var(--fg-subtle);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--fg-subtle) 20%, transparent);
  }
  .spacer { flex: 1; }

  button {
    font: inherit;
    font-size: 14px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid var(--border-strong);
    background: var(--bg);
    color: var(--fg);
    transition: background .15s, border-color .15s;
    white-space: nowrap;
  }
  button:hover { background: var(--surface-hover); }
  button:active { transform: translateY(0.5px); }
  button.primary {
    background: var(--accent);
    color: var(--accent-fg);
    border-color: var(--accent);
  }
  button.primary:hover { opacity: .88; background: var(--accent); }

  .card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    background: var(--bg);
  }
  table {
    border-collapse: collapse;
    width: 100%;
    font-size: 14px;
  }
  thead th {
    text-align: left;
    font-weight: 500;
    color: var(--fg-muted);
    font-size: 12px;
    letter-spacing: 0.01em;
    text-transform: uppercase;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { transition: background .1s; }
  tbody tr:hover td { background: var(--surface); }
  td.name { font-weight: 500; }
  td.derived {
    color: var(--fg-muted);
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
    font-size: 13px;
  }
  .none { color: var(--fg-subtle); }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 999px;
    line-height: 1.4;
  }
  .badge::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }
  .badge-yes { color: var(--success); background: var(--success-bg); }
  .badge-no  { color: var(--fg-subtle); background: var(--surface); }

  #error {
    color: var(--danger-fg);
    background: color-mix(in srgb, var(--danger-fg) 8%, var(--bg));
    border: 1px solid color-mix(in srgb, var(--danger-fg) 25%, transparent);
    border-radius: 8px;
    font-size: 13px;
    padding: 12px 14px;
    margin-bottom: 16px;
    white-space: pre-wrap;
  }

  #empty {
    padding: 40px 16px;
    text-align: center;
    color: var(--fg-subtle);
    font-size: 14px;
  }

  /* loading skeleton */
  #loading { padding: 8px 0; }
  .skel-row {
    display: flex; gap: 16px; padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .skel {
    height: 14px; border-radius: 6px;
    background: linear-gradient(90deg,
      var(--surface) 25%, var(--surface-hover) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.3s ease-in-out infinite;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  @media (max-width: 640px) {
    body { padding: 24px 14px 60px; }
    thead th, tbody td { padding: 10px 12px; }
    .search { max-width: none; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1><span class="logo">CT</span> Client Tracker</h1>
    </header>
    <p id="status">Loading…</p>

    <div id="error" hidden></div>

    <div class="toolbar" id="toolbar" hidden>
      <label class="search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="search" id="search" placeholder="Search clients…"
               autocomplete="off" spellcheck="false">
      </label>
      <div class="spacer"></div>
      <button id="refresh">Refresh</button>
    </div>

    <div class="card">
      <div id="loading" hidden>
        <div class="skel-row"><div class="skel" style="width:22%"></div><div class="skel" style="width:16%"></div><div class="skel" style="width:16%"></div><div class="skel" style="width:18%"></div></div>
        <div class="skel-row"><div class="skel" style="width:26%"></div><div class="skel" style="width:14%"></div><div class="skel" style="width:14%"></div><div class="skel" style="width:16%"></div></div>
        <div class="skel-row"><div class="skel" style="width:20%"></div><div class="skel" style="width:18%"></div><div class="skel" style="width:16%"></div><div class="skel" style="width:14%"></div></div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Client</th>
            <th>Bill activated?</th>
            <th>Pettycash activated?</th>
            <th>Client input date until</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <div id="empty" hidden></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
